{% extends "base.html" %}

{% block title %}Edit {{ profile["dance_name"] }} | LiteFeet Ledger{% endblock %}

{% block content %}
<section class="content-section">
    <p>
        <a href="{{ profile | profile_url }}" class="small-note">← Back to Profile</a>
    </p>

    <h1>Edit Person Profile</h1>
    <p>Use one profile for every role this person has. Example: Dancer, Producer, Host, Judge.</p>

    <form method="POST" class="form-card admin-edit-form">
        <label>
            Profile Name
            <input type="text" name="dance_name" value="{{ profile['dance_name'] }}" required>
        </label>

        <label>
            Roles
            <input type="text" name="role_tags" value="{{ profile['role_tags'] or '' }}" placeholder="Dancer, Producer, Host, Judge">
        </label>

        <label>
            Team / Affiliation
            <input type="text" name="team_affiliation" value="{{ profile['team_affiliation'] or '' }}">
        </label>

        <label>
            Borough / Scene
            <input type="text" name="borough_scene" value="{{ profile['borough_scene'] or '' }}">
        </label>

        <label>
            Source URL
            <input type="url" name="source_url" value="{{ profile['source_url'] or '' }}">
        </label>

        <label>
            Status
            <select name="status">
                {% for status in allowed_statuses %}
                    <option value="{{ status }}" {% if profile["status"] == status %}selected{% endif %}>
                        {{ status }}
                    </option>
                {% endfor %}
            </select>
        </label>

        <label>
            Bio / Profile Notes
            <textarea name="bio" rows="8">{{ profile['bio'] or '' }}</textarea>
        </label>

        <button type="submit" class="button primary">Save Profile</button>
    </form>
</section>
{% endblock %}
