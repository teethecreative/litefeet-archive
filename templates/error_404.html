<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Page Not Found | The LiteFeet Ledger</title>
    <style>
        body {
            margin: 0;
            background: #030303;
            color: #f4f1e8;
            font-family: Arial, sans-serif;
        }
        .wrap {
            max-width: 980px;
            margin: 0 auto;
            padding: 42px 22px;
        }
        .eyebrow {
            color: #d8b84c;
            text-transform: uppercase;
            letter-spacing: .18em;
            font-size: 12px;
            font-weight: 700;
        }
        h1 {
            font-size: clamp(40px, 8vw, 78px);
            line-height: .95;
            margin: 18px 0;
        }
        p {
            color: #d7d1c4;
            font-size: 18px;
            line-height: 1.5;
        }
        .actions {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            margin-top: 24px;
        }
        a {
            color: #f0d56b;
            text-decoration: none;
            font-weight: 700;
        }
        .button {
            border: 1px solid rgba(240, 213, 107, .45);
            border-radius: 999px;
            padding: 12px 16px;
        }
    </style>
</head>
<body>
    <main class="wrap">
        <p class="eyebrow">404 Not Found</p>
        <h1>This page is not in the Ledger yet.</h1>
        <p>The link may have moved, the page may still be under rebuild, or the record may not exist yet.</p>
        <div class="actions">
            <a class="button" href="/">Back Home</a>
            <a class="button" href="/submit/start">Add to the Ledger</a>
            <a class="button" href="/account/login">Log In</a>
        </div>
    </main>
</body>
</html>
